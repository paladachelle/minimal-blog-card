<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>devChallenges.io | Minimal Blog Card</title>
  </head>
  <body>
    <main>
      <div class="blog-card">
        <img
          src="resources/Cactus.jpg"
          alt="Cactus in a pot"
          class="blog-img"
        />
        <p class="blog-tag">Design</p>
        <h1 class="blog-title">Embracing Minimalism</h1>
        <p class="blog-desc">
          From minimalist sculptures to minimalist paintings, this blog will
          inspire you to appreciate the beauty that lies in simplicity.
        </p>
        <hr class="blog-divider" />
        <p class="blog-author">Annie Spratt</p>
      </div>
    </main>

    <div class="author-info">
      Coded by <a href="#">Rachelle</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>
  </body>
</html>
